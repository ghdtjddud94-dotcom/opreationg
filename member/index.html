<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무 체크리스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a26;
      --card2: #1e1e2e;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6af7;
      --accent2: #5eead4;
      --text: #f0f0f8;
      --muted: #6b6b80;
      --success: #22c55e;
      --danger: #ef4444;
    }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    .glow-bg {
      position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(124,106,247,0.14) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* 헤더 */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex; align-items: center; gap: 16px;
    }
    .back-btn {
      color: var(--muted); text-decoration: none;
      font-size: 22px; line-height: 1;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    .header-info { flex: 1; }
    .header-name {
      font-size: 18px; font-weight: 700;
    }
    .header-sub {
      font-size: 12px; color: var(--muted); margin-top: 1px;
    }
    .add-brand-btn {
      padding: 9px 18px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .add-brand-btn:hover {
      background: #6a58e0;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(124,106,247,0.35);
    }

    /* 메인 */
    .main {
      position: relative; z-index: 1;
      max-width: 800px; margin: 0 auto;
      padding: 32px 20px 0;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center; padding: 80px 20px;
    }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 8px;
    }
    .empty-state p { color: var(--muted); font-size: 15px; }

    /* 브랜드 카드 */
    .brands-list { display: flex; flex-direction: column; gap: 16px; }
    .brand-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .brand-card:hover { border-color: rgba(124,106,247,0.25); }

    .brand-header {
      padding: 20px 24px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
    }
    .brand-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(124,106,247,0.25), rgba(94,234,212,0.15));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .brand-meta { flex: 1; }
    .brand-name {
      font-size: 16px; font-weight: 700;
    }
    .brand-progress-text {
      font-size: 12px; color: var(--muted); margin-top: 3px;
    }
    .brand-actions { display: flex; align-items: center; gap: 10px; }
    .delete-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted); font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .delete-btn:hover {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: var(--danger);
    }
    .chevron {
      color: var(--muted); font-size: 20px;
      transition: transform 0.3s;
    }
    .brand-card.open .chevron { transform: rotate(90deg); }

    /* 진행률 바 */
    .progress-bar-wrap {
      padding: 0 24px 0;
      margin-bottom: 0;
    }
    .progress-bar-bg {
      height: 4px; border-radius: 100px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.5s ease;
    }

    /* 탭 */
    .tabs-wrap { padding: 16px 24px 0; }
    .tabs {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 4px;
    }
    .tab-btn {
      flex: 1; padding: 9px 0;
      border: none; border-radius: 9px;
      background: transparent;
      color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn.active {
      background: var(--card2);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .tab-btn .tab-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 100px;
      font-size: 11px;
      background: rgba(124,106,247,0.2);
      color: var(--accent);
    }
    .tab-btn.active .tab-badge {
      background: rgba(124,106,247,0.25);
    }

    /* 체크리스트 */
    .checklist-body {
      padding: 16px 24px 20px;
      display: none;
    }
    .brand-card.open .checklist-body { display: block; }
    .checklist-pane { display: none; }
    .checklist-pane.active { display: block; }

    .check-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .check-item:hover { background: rgba(255,255,255,0.04); }
    .check-item:last-child { margin-bottom: 0; }

    .checkbox {
      width: 22px; height: 22px;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      background: transparent;
    }
    .check-item.checked .checkbox {
      background: var(--success);
      border-color: var(--success);
    }
    .check-item.checked .checkbox::after {
      content: '✓';
      color: #fff; font-size: 13px; font-weight: 700;
    }

    .check-label { flex: 1; font-size: 15px; font-weight: 500; }
    .check-item.checked .check-label {
      color: var(--muted);
      text-decoration: line-through;
    }

    .check-time {
      font-size: 11px; color: var(--muted);
    }

    /* 모달 */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px;
      width: 100%; max-width: 400px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.2s;
    }
    .modal-overlay.show .modal {
      transform: scale(1) translateY(0);
    }
    .modal h3 {
      font-size: 18px; font-weight: 700; margin-bottom: 6px;
    }
    .modal p {
      color: var(--muted); font-size: 14px; margin-bottom: 20px;
    }
    .modal input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text); font-size: 16px;
      outline: none; font-family: inherit;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--muted);
      font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-cancel:hover { color: var(--text); }
    .btn-confirm {
      flex: 1; padding: 12px;
      background: var(--accent); border: none;
      border-radius: 12px; color: #fff;
      font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-confirm:hover { background: #6a58e0; }

    /* 로딩 */
    .loading {
      text-align: center; padding: 80px 20px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(124,106,247,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px; font-weight: 500;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(34,197,94,0.4); color: #4ade80; }
    .toast.error { border-color: rgba(239,68,68,0.4); color: #f87171; }
  </style>
</head>
<body>
  <div class="glow-bg"></div>

  <header>
    <a class="back-btn" href="/">←</a>
    <div class="header-info">
      <div class="header-name" id="memberNameDisplay">로딩 중...</div>
      <div class="header-sub">브랜드별 업무 체크리스트</div>
    </div>
    <button class="add-brand-btn" id="addBrandBtn">＋ 브랜드 추가</button>
  </header>

  <div class="main">
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <div>데이터 불러오는 중...</div>
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">📋</div>
      <h2>담당 브랜드가 없어요</h2>
      <p>상단 '브랜드 추가' 버튼으로 첫 번째 브랜드를 등록해보세요</p>
    </div>
    <div class="brands-list" id="brandsList"></div>
  </div>

  <!-- 브랜드 추가 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>브랜드 추가</h3>
      <p>수주된 브랜드명을 입력해주세요</p>
      <input type="text" id="brandNameInput" placeholder="예) 나이키, 삼성전자..." maxlength="50" />
      <div class="modal-btns">
        <button class="btn-cancel" id="cancelBtn">취소</button>
        <button class="btn-confirm" id="confirmBtn">추가하기</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://cknmkcgnzunuvlsnlxuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrbm1rY2duenVudXZsc25seHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjU1NzYsImV4cCI6MjA5NDE0MTU3Nn0.ZIvQYIPkBKY6Ys73MINdbfCPLU3V7-gfkcLJO-P5tFM';
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const PRE_TASKS = [
      { key: 'meeting_material', label: '미팅자료' },
      { key: 'proposal', label: '실행안 / 제안서' },
    ];
    const POST_TASKS = [
      { key: 'google_sheet', label: '구글시트 생성' },
      { key: 'vendor_upload', label: '신규업체 업로드' },
      { key: 'quotation', label: '견적서' },
      { key: 'invoice', label: '계산서 발행' },
      { key: 'settlement', label: '정산 일정' },
    ];

    // URL에서 팀원명 읽기
    const params = new URLSearchParams(location.search);
    const memberName = params.get('name');
    if (!memberName) { location.href = '/'; }
    document.getElementById('memberNameDisplay').textContent = memberName;
    document.title = `${memberName} - 업무 체크리스트`;

    let brandsData = [];

    // 데이터 로드
    async function loadData() {
      document.getElementById('loadingEl').style.display = 'block';
      document.getElementById('brandsList').innerHTML = '';
      document.getElementById('emptyState').style.display = 'none';

      const { data: brands, error } = await sb
        .from('op_brands')
        .select('*, op_tasks(*)')
        .eq('member_name', memberName)
        .order('created_at', { ascending: true });

      document.getElementById('loadingEl').style.display = 'none';

      if (error) { showToast('데이터 로드 실패', 'error'); return; }

      brandsData = brands || [];
      renderBrands();
    }

    function renderBrands() {
      const list = document.getElementById('brandsList');
      list.innerHTML = '';
      if (brandsData.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';
      brandsData.forEach(brand => list.appendChild(createBrandCard(brand)));
    }

    function getTaskStatus(tasks, stage, key) {
      const t = tasks.find(t => t.stage === stage && t.task_key === key);
      return t ? { completed: t.is_completed, time: t.completed_at } : { completed: false, time: null };
    }

    function calcProgress(tasks) {
      const all = [...PRE_TASKS.map(t => ({...t, stage:'pre'})), ...POST_TASKS.map(t => ({...t, stage:'post'}))];
      const done = all.filter(t => {
        const s = getTaskStatus(tasks, t.stage, t.key);
        return s.completed;
      }).length;
      return { done, total: all.length };
    }

    function createBrandCard(brand) {
      const tasks = brand.op_tasks || [];
      const { done, total } = calcProgress(tasks);
      const pct = Math.round((done / total) * 100);

      const card = document.createElement('div');
      card.className = 'brand-card';
      card.dataset.brandId = brand.id;

      // 탭 뱃지 계산
      const preDone = PRE_TASKS.filter(t => getTaskStatus(tasks, 'pre', t.key).completed).length;
      const postDone = POST_TASKS.filter(t => getTaskStatus(tasks, 'post', t.key).completed).length;

      card.innerHTML = `
        <div class="brand-header">
          <div class="brand-icon">🏷️</div>
          <div class="brand-meta">
            <div class="brand-name">${brand.brand_name}</div>
            <div class="brand-progress-text">${done}/${total} 완료 · ${pct}%</div>
          </div>
          <div class="brand-actions">
            <button class="delete-btn" data-id="${brand.id}" title="삭제">✕</button>
            <span class="chevron">›</span>
          </div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="checklist-body">
          <div class="tabs-wrap">
            <div class="tabs">
              <button class="tab-btn active" data-tab="pre">수주전 <span class="tab-badge">${preDone}/${PRE_TASKS.length}</span></button>
              <button class="tab-btn" data-tab="post">수주후 <span class="tab-badge">${postDone}/${POST_TASKS.length}</span></button>
            </div>
          </div>
          <div class="checklist-pane active" data-pane="pre">
            ${PRE_TASKS.map(t => renderCheckItem(brand.id, tasks, 'pre', t)).join('')}
          </div>
          <div class="checklist-pane" data-pane="post">
            ${POST_TASKS.map(t => renderCheckItem(brand.id, tasks, 'post', t)).join('')}
          </div>
        </div>
      `;

      // 헤더 토글
      card.querySelector('.brand-header').addEventListener('click', (e) => {
        if (e.target.closest('.delete-btn')) return;
        card.classList.toggle('open');
      });

      // 삭제
      card.querySelector('.delete-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`"${brand.brand_name}" 브랜드를 삭제할까요?`)) return;
        const { error } = await sb.from('op_brands').delete().eq('id', brand.id);
        if (!error) { showToast('브랜드가 삭제됐어요', 'success'); loadData(); }
        else showToast('삭제 실패', 'error');
      });

      // 탭 전환
      card.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          card.querySelectorAll('.checklist-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          card.querySelector(`[data-pane="${btn.dataset.tab}"]`).classList.add('active');
        });
      });

      // 체크 토글
      card.querySelectorAll('.check-item').forEach(item => {
        item.addEventListener('click', () => toggleTask(item, brand.id));
      });

      return card;
    }

    function renderCheckItem(brandId, tasks, stage, taskDef) {
      const { completed, time } = getTaskStatus(tasks, stage, taskDef.key);
      const timeStr = time ? new Date(time).toLocaleDateString('ko-KR', {month:'numeric',day:'numeric'}) : '';
      return `
        <div class="check-item ${completed ? 'checked' : ''}" data-brand="${brandId}" data-stage="${stage}" data-key="${taskDef.key}">
          <div class="checkbox"></div>
          <div class="check-label">${taskDef.label}</div>
          ${timeStr ? `<div class="check-time">${timeStr}</div>` : ''}
        </div>
      `;
    }

    async function toggleTask(item, brandId) {
      const stage = item.dataset.stage;
      const taskKey = item.dataset.key;
      const isChecked = item.classList.contains('checked');
      const newVal = !isChecked;

      item.classList.toggle('checked', newVal);

      const { error } = await sb.from('op_tasks').upsert({
        brand_id: brandId,
        stage,
        task_key: taskKey,
        is_completed: newVal,
        completed_at: newVal ? new Date().toISOString() : null,
        updated_at: new Date().toISOString(),
      }, { onConflict: 'brand_id,stage,task_key' });

      if (error) {
        item.classList.toggle('checked', isChecked);
        showToast('저장 실패', 'error');
      } else {
        await loadData();
      }
    }

    // 브랜드 추가 모달
    const modal = document.getElementById('modalOverlay');
    const input = document.getElementById('brandNameInput');

    document.getElementById('addBrandBtn').addEventListener('click', () => {
      modal.classList.add('show');
      input.value = '';
      setTimeout(() => input.focus(), 100);
    });

    document.getElementById('cancelBtn').addEventListener('click', () => modal.classList.remove('show'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

    document.getElementById('confirmBtn').addEventListener('click', addBrand);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBrand(); });

    async function addBrand() {
      const name = input.value.trim();
      if (!name) { input.focus(); return; }

      const { error } = await sb.from('op_brands').insert({ member_name: memberName, brand_name: name });

      if (error) {
        if (error.code === '23505') showToast('이미 있는 브랜드명이에요', 'error');
        else showToast('추가 실패', 'error');
        return;
      }

      modal.classList.remove('show');
      showToast(`"${name}" 브랜드가 추가됐어요 🎉`, 'success');
      loadData();
    }

    // 토스트
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    loadData();
  </script>
</body>
</html>
