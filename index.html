<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영업팀 업무 체크</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6af7;
      --accent2: #5eead4;
      --text: #f0f0f8;
      --muted: #6b6b80;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .glow-bg {
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(124,106,247,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
    }

    .logo {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo .badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(124,106,247,0.15);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 100px;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #a89cf5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .logo p {
      color: var(--muted);
      font-size: 15px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .members-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .member-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .member-card:hover {
      border-color: rgba(124,106,247,0.4);
      background: rgba(124,106,247,0.08);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124,106,247,0.15);
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .member-info .name {
      font-size: 16px;
      font-weight: 600;
    }

    .member-info .label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 18px;
      transition: transform 0.2s;
    }

    .member-card:hover .arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    .admin-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(124,106,247,0.15) 0%, rgba(94,234,212,0.08) 100%);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
      margin-top: 8px;
    }

    .admin-card:hover {
      border-color: rgba(124,106,247,0.6);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124,106,247,0.2);
    }

    .admin-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .admin-info .name {
      font-size: 17px;
      font-weight: 700;
    }

    .admin-info .label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* 아바타 색상 */
    .c1 { background: rgba(239,68,68,0.2); color: #f87171; }
    .c2 { background: rgba(234,179,8,0.2); color: #fbbf24; }
    .c3 { background: rgba(34,197,94,0.2); color: #4ade80; }
    .c4 { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .c5 { background: rgba(168,85,247,0.2); color: #c084fc; }
  </style>
</head>
<body>
  <div class="glow-bg"></div>

  <div class="container">
    <div class="logo">
      <div class="badge">영업팀 운영 시스템</div>
      <h1>업무 체크리스트</h1>
      <p>브랜드별 수주 업무를 체계적으로 관리하세요</p>
    </div>

    <div class="section-title">팀원 선택</div>
    <div class="members-grid">
      <a class="member-card" href="/member/?name=김병찬">
        <div class="avatar c1">병</div>
        <div class="member-info">
          <div class="name">김병찬</div>
          <div class="label">내 업무 보기</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="member-card" href="/member/?name=김요엘">
        <div class="avatar c2">요</div>
        <div class="member-info">
          <div class="name">김요엘</div>
          <div class="label">내 업무 보기</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="member-card" href="/member/?name=최진유">
        <div class="avatar c3">진</div>
        <div class="member-info">
          <div class="name">최진유</div>
          <div class="label">내 업무 보기</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="member-card" href="/member/?name=강사랑">
        <div class="avatar c4">사</div>
        <div class="member-info">
          <div class="name">강사랑</div>
          <div class="label">내 업무 보기</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="member-card" href="/member/?name=신예지" style="grid-column: span 2;">
        <div class="avatar c5">예</div>
        <div class="member-info">
          <div class="name">신예지</div>
          <div class="label">내 업무 보기</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <div class="divider"></div>

    <div class="section-title">관리자</div>
    <a class="admin-card" href="/admin/">
      <div class="admin-icon">📊</div>
      <div class="admin-info">
        <div class="name">어드민 대시보드</div>
        <div class="label">전체 팀원 업무 현황 한눈에 보기</div>
      </div>
      <span class="arrow" style="margin-left:auto; font-size:20px; color:var(--accent)">›</span>
    </a>
  </div>
</body>
</html>
